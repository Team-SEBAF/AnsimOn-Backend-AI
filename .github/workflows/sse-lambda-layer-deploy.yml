name: SSE Deploy Lambda Layer

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-layer:
    runs-on: ubuntu-latest
    env:
      # Use workflow from: main → prod, dev → dev
      ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install poetry
        run: |
          pip install poetry
          poetry self add poetry-plugin-export

      - name: Export requirements (shared + SSE only, worker optional 제외)
        run: |
          poetry export \
            --format=requirements.txt \
            --without-hashes \
            --output requirements.layer.txt
          # AWS Lambda 기본 제공 제외
          sed -i '/^boto3/d;/^botocore/d;/^s3transfer/d' requirements.layer.txt

      - name: Build layer
        run: |
          mkdir -p layer/python
          docker run --rm \
            -v "$PWD":/var/task \
            --platform linux/amd64 \
            public.ecr.aws/sam/build-python3.11 \
            bash -c "
              pip install --no-cache-dir -r requirements.layer.txt -t layer/python
            "

      - name: Zip layer
        run: |
          cd layer
          zip -r layer.zip .
          cd ..

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ 'ap-northeast-2' }}

      - name: Publish layer
        run: |
          aws lambda publish-layer-version \
            --layer-name ansimon-sse-deps \
            --zip-file fileb://layer/layer.zip \
            --compatible-runtimes python3.11

  attach-layer-and-publish:
    runs-on: ubuntu-latest
    needs: deploy-layer
    env:
      ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ 'ap-northeast-2' }}

      - name: Attach latest layer
        env:
          FUNC_NAME: ${{ env.ENV == 'dev' && 'ansimon-sse-dev' || 'ansimon-sse-prod' }}
        run: |
          NEW_DEPS_ARN=$(aws lambda list-layer-versions \
            --layer-name ansimon-sse-deps \
            --query 'LayerVersions[0].LayerVersionArn' \
            --output text)
          echo "ansimon-sse-deps: $NEW_DEPS_ARN"
          aws lambda update-function-configuration \
            --function-name $FUNC_NAME \
            --layers $NEW_DEPS_ARN

      - name: Wait after layer attach
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.ENV == 'dev' && 'ansimon-sse-dev' || 'ansimon-sse-prod' }}

      - name: Publish version
        id: publish
        run: |
          VERSION=$(aws lambda publish-version \
            --function-name ${{ env.ENV == 'dev' && 'ansimon-sse-dev' || 'ansimon-sse-prod' }} \
            --query Version \
            --output text)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update alias
        run: |
          aws lambda update-alias \
            --function-name ${{ env.ENV == 'dev' && 'ansimon-sse-dev' || 'ansimon-sse-prod' }} \
            --name ${{ env.ENV }} \
            --function-version ${{ steps.publish.outputs.version }}
