name: Deploy Lambda

on:
  push:
    branches: [dev]
    paths-ignore:
      - "README.md"
      - "README.ko.md"
      - "**.md"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-lambda:
    runs-on: ubuntu-latest
    env:
      # push to dev → dev, workflow_dispatch(Use workflow from) main → prod, dev → dev
      ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - name: Build lambda package
        run: |
          rm -rf package lambda.zip
          mkdir package
          cp -r shared package/
          cp -r sse package/
          cd package
          zip -r ../lambda.zip .
          cd ..

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ 'ap-northeast-2' }}

      - name: Update lambda code
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.ENV == 'dev' && 'ansimon-sse-dev' || 'ansimon-sse-prod' }} \
            --zip-file fileb://lambda.zip

      - name: Wait for lambda update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.ENV == 'dev' && 'ansimon-sse-dev' || 'ansimon-sse-prod' }}

      - name: Publish version
        id: publish
        run: |
          VERSION=$(aws lambda publish-version \
            --function-name ${{ env.ENV == 'dev' && 'ansimon-sse-dev' || 'ansimon-sse-prod' }} \
            --query Version \
            --output text)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update alias
        run: |
          aws lambda update-alias \
            --function-name ${{ env.ENV == 'dev' && 'ansimon-sse-dev' || 'ansimon-sse-prod' }} \
            --name ${{ env.ENV }} \
            --function-version ${{ steps.publish.outputs.version }}
